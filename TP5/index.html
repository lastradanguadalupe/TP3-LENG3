<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="estilo_calc.css">
</head>
<body>
    <div class="contenedor-calculadora">
        <header>
            <h1>Calculadora Pro</h1>
            <p>Ingeniería en Informática - UCASAL</p>
        </header>
        
        <main id="pantalla-resultado">
            <div class="card">
                <h3>Ingrese los datos</h3>
                <input type="number" id="num1" placeholder="Primer número" class="input-calc">
                <input type="number" id="num2" placeholder="Segundo número" class="input-calc">
        
                <select id="operacion" class="input-calc">
                    <option value="suma">Suma</option>
                    <option value="resta">Resta</option>
                    <option value="multiplicacion">Multiplicación</option>
                    <option value="division">División</option>
                </select>

                <button onclick="calcular()" class="btn-calcular">Calcular Resultado</button>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
